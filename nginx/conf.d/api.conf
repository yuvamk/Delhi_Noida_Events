# ─── API Server Block ─────────────────────────────────────────────
server {
    listen 80;
    server_name _;                                  # catch-all; replace with domain

    # ── Security ────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # Connection limits (per IP)
    limit_conn conn_per_ip     50;
    limit_conn conn_per_server 5000;

    # ── Health (no rate limit, no logging) ─────────────────────
    location = /api/v1/health {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log off;
    }

    location = /api/v1/ready {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log off;
    }

    # ── Auth routes — strict rate limit, no cache ───────────────
    location ~ ^/api/v1/auth/ {
        limit_req   zone=auth burst=5 nodelay;
        limit_req   zone=global burst=20 nodelay;

        proxy_pass             http://api_backend;
        proxy_http_version     1.1;
        proxy_set_header       Host             $host;
        proxy_set_header       X-Real-IP        $remote_addr;
        proxy_set_header       X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       Connection       "";

        # Disable cache for auth
        proxy_no_cache          1;
        proxy_cache_bypass      1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Search — medium rate limit ──────────────────────────────
    location ~ ^/api/v1/events/search {
        limit_req zone=search burst=10 nodelay;

        proxy_pass             http://api_backend;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       Connection        "";

        # Short nginx-level cache for searches
        proxy_cache            api_cache;
        proxy_cache_valid      200 1m;
        add_header             X-Nginx-Cache $upstream_cache_status always;
    }

    # ── Events API — cached at nginx level ─────────────────────
    location ~ ^/api/v1/events {
        limit_req zone=api burst=30 nodelay;

        proxy_pass             http://api_backend;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       Connection        "";

        # Nginx-level cache (on top of Redis)
        proxy_cache            api_cache;
        proxy_cache_methods    GET;
        proxy_cache_valid      200 5m;
        proxy_cache_bypass     $http_pragma $http_authorization;  # bypass for auth'd requests
        add_header             X-Nginx-Cache $upstream_cache_status always;

        # Support conditional GET (ETag) from upstream
        proxy_pass_header      ETag;
        proxy_pass_header      Last-Modified;
    }

    # ── Admin — IP whitelist (restrict in production) ──────────
    location ~ ^/api/v1/admin {
        limit_req zone=api burst=10 nodelay;

        # Optional: uncomment & set your office IP
        # allow 203.0.113.0/24;
        # deny all;

        proxy_pass             http://api_backend;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       Connection        "";

        proxy_no_cache         1;
        proxy_cache_bypass     1;
    }

    # ── All other API routes ────────────────────────────────────
    location /api/ {
        limit_req zone=global burst=50 nodelay;

        proxy_pass             http://api_backend;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       Connection        "";
    }

    # ── Next.js frontend (if co-hosted) ─────────────────────────
    location / {
        limit_req zone=static burst=100 nodelay;

        proxy_pass             http://frontend:3000;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";   # websockets
    }

    # ── Next.js static assets — long cache ─────────────────────
    location /_next/static/ {
        proxy_pass    http://frontend:3000;
        add_header    Cache-Control "public, max-age=31536000, immutable";
        access_log    off;
    }

    # ── Error pages ──────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        add_header Content-Type application/json always;
        return 429 '{"success":false,"error":"Too many requests. Please slow down.","code":"RATE_LIMIT"}';
    }

    error_page 502 503 504 /50x.json;
    location = /50x.json {
        add_header Content-Type application/json always;
        return 503 '{"success":false,"error":"Service temporarily unavailable. We are working on it.","code":"SERVICE_UNAVAILABLE"}';
    }
}
