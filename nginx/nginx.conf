# ─────────────────────────────────────────────────────────────────
#  Nginx — High-Traffic Production Config
#  For Delhi-Noida Events Platform
#
#  Features:
#   • Upstream load balancing (round-robin, health checks)
#   • Rate limiting zones (different tiers)
#   • Gzip compression
#   • Static file caching
#   • DDoS protection (connection + request limits)
#   • HTTP/2
#   • Security headers
#   • Bot protection
# ─────────────────────────────────────────────────────────────────

user nginx;
worker_processes auto;                    # 1 per CPU core
worker_rlimit_nofile 65535;               # max open files per worker
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;              # max connections per worker
    multi_accept on;                      # accept all pending connections
    use epoll;                            # linux kernel I/O (most efficient)
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time '
                    'cache=$upstream_cache_status';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # ── Performance ─────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;                    # hide nginx version

    # ── Timeouts ────────────────────────────────────────────────
    proxy_connect_timeout    5s;
    proxy_send_timeout      30s;
    proxy_read_timeout      30s;
    send_timeout            30s;
    client_header_timeout   10s;
    client_body_timeout     10s;
    reset_timedout_connection on;         # free resources on timeout

    # ── Client limits ───────────────────────────────────────────
    client_max_body_size     2m;
    client_body_buffer_size  16k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # ── Gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript application/x-javascript
        application/xml application/rss+xml
        image/svg+xml;

    # ── Rate Limit Zones (shared memory) ─────────────────────────
    # Zone format: $binary_remote_addr = per-IP limits
    limit_req_zone  $binary_remote_addr zone=global:20m    rate=100r/m;
    limit_req_zone  $binary_remote_addr zone=api:20m       rate=60r/m;
    limit_req_zone  $binary_remote_addr zone=search:10m    rate=30r/m;
    limit_req_zone  $binary_remote_addr zone=auth:5m       rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=static:10m    rate=200r/m;

    # Connection limit zones
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
    limit_conn_zone $server_name        zone=conn_per_server:10m;

    # Rate limit log level
    limit_req_log_level warn;
    limit_req_status 429;

    # ── Upstream — Backend API Instances ──────────────────────────
    upstream api_backend {
        least_conn;                                   # route to least-busy backend
        server backend:5000 max_fails=3 fail_timeout=30s;
        keepalive 32;                                 # keep 32 connections warm per worker
    }

    # ── Proxy Cache (disk cache for API responses) ─────────────────
    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=api_cache:20m
        max_size=500m
        inactive=10m
        use_temp_path=off;

    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_valid 200 5m;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 5s;

    # ── Include server blocks ─────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
