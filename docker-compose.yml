version: "3.9"

# ─────────────────────────────────────────────────────────────────
#  Delhi-Noida Events Platform — Production Docker Compose
#  High-traffic setup with Nginx, Redis, MongoDB, 2x Backend
# ─────────────────────────────────────────────────────────────────
# Usage:
#   docker compose --env-file .env up -d           # start all
#   docker compose up -d --scale backend=4         # 4 API replicas
#   docker compose logs -f backend                 # stream logs
#   docker compose exec backend sh                 # shell

services:

  # ─── Nginx — Reverse Proxy & Load Balancer ─────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: dne-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_cache:/var/cache/nginx
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dne-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Backend — Node.js API (scalable, 2 replicas minimum) ──────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    # No external ports — nginx proxies to this
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - HOST=0.0.0.0
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - SCRAPER_API_KEY=${SCRAPER_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - TRUST_PROXY=1
      - GLOBAL_RATE_LIMIT=500
      - REQUEST_TIMEOUT_MS=15000
      - MEM_LIMIT_MB=512
      - EXTRA_ORIGINS=${EXTRA_ORIGINS}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2                 # run 2 API instances behind nginx
      update_config:
        order: start-first        # zero-downtime deploy: new before old
        failure_action: rollback
        parallelism: 1
        delay: 10s
      rollback_config:
        order: stop-first
      resources:
        limits:
          cpus: "1.0"
          memory: 600M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dne-network

  # ─── Redis — Cache & Rate Limit Store ──────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: dne-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redispassword}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 60
      --timeout 300
      --hz 20
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - dne-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 300M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ─── MongoDB (local dev — use MongoDB Atlas in production) ──────
  mongodb:
    image: mongo:7.0
    container_name: dne-mongodb
    command: >
      mongod
      --bind_ip_all
      --wiredTigerCacheSizeGB 1
      --quiet
    expose:
      - "27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme_in_production}
      MONGO_INITDB_DATABASE: delhi_noida_events
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./backend/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    restart: unless-stopped
    networks:
      - dne-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1.5G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Python Scraper ─────────────────────────────────────────────
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: dne-scraper
    environment:
      - BACKEND_API_URL=http://backend:5000/api/v1
      - SCRAPER_API_KEY=${SCRAPER_API_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - PYTHONUNBUFFERED=1
      - SCRAPER_MODE=scheduled
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - scraper_logs:/app/logs
    networks:
      - dne-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ─── Frontend (Next.js — optional, or deploy to Vercel) ────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dne-frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://nginx/api/v1}
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - dne-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  mongodb_data:     { driver: local }
  mongodb_config:   { driver: local }
  redis_data:       { driver: local }
  scraper_logs:     { driver: local }
  nginx_cache:      { driver: local }
  certbot_www:      { driver: local }
  certbot_conf:     { driver: local }

networks:
  dne-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
